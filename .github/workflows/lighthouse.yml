name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Update lighthouse/baseline.json from this run"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: ${{ github.event_name == 'workflow_dispatch' && inputs.update_baseline == true && 'write' || 'read' }}
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Lighthouse audit
        env:
          CI: "true"
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.update_baseline }}" = "true" ]; then
            npm run lighthouse:update-baseline
          else
            npm run lighthouse
          fi

      - name: Upload Lighthouse artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          retention-days: 30
          path: |
            lighthouse/latest.json
            lighthouse/report.md

      - name: Write job summary
        if: always() && hashFiles('lighthouse/report.md') != ''
        run: cat lighthouse/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && hashFiles('lighthouse/report.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('lighthouse/report.md', 'utf8');
            const marker = '<!-- lighthouse-report -->';
            const body = `${marker}\n## Lighthouse Performance\n\n${report}\n\n_Artifact: **lighthouse-report** workflow run._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Commit baseline update
        if: github.event_name == 'workflow_dispatch' && inputs.update_baseline == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lighthouse/baseline.json
          git diff --staged --quiet || git commit -m "chore: update Lighthouse baseline"
          git push
